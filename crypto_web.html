<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CryptoSuite - Tous les Algorithmes TP1 à TP6</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ==================== STYLES CYBERPUNK ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b14;
  --bg2:#0b1120;
  --bg3:#0f1929;
  --surface:#111d30;
  --surface2:#162035;
  --border:#1e3a5f;
  --border2:#2a4f7a;
  --cyan:#00d4ff;
  --cyan2:#00a8cc;
  --green:#00ff88;
  --green2:#00cc6a;
  --amber:#ffb300;
  --red:#ff4060;
  --purple:#a855f7;
  --text:#d4e8ff;
  --text2:#7fa8cc;
  --text3:#3d6b8f;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:relative;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,180,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(0,255,136,0.03) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}
.scanline{
  position:fixed;
  top:-100%;
  left:0;right:0;
  height:200px;
  background:linear-gradient(transparent,rgba(0,212,255,0.02),transparent);
  animation:scan 8s linear infinite;
  pointer-events:none;
  z-index:1;
}
@keyframes scan{to{top:100%}}

/* HEADER */
header{
  position:relative;z-index:10;
  padding:14px 24px;
  background:rgba(11,17,32,0.95);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:24px;
  backdrop-filter:blur(12px);
}
.logo{
  display:flex;align-items:center;gap:12px;
}
.logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--cyan),var(--green));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
}
.logo-text{
  font-family:'Orbitron',monospace;
  font-weight:700;
  font-size:20px;
  background:linear-gradient(90deg,var(--cyan),var(--green));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header-stats{
  display:flex;gap:20px;margin-left:auto;
}
.hstat{
  display:flex;flex-direction:column;align-items:center;
  padding:4px 16px;
  border:1px solid var(--border);
  border-radius:6px;
  background:rgba(0,212,255,0.03);
}
.hstat-val{
  font-family:'Orbitron',monospace;
  font-size:14px;font-weight:600;
  color:var(--cyan);
}
.hstat-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--text3);
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* MAIN LAYOUT */
main{
  position:relative;z-index:5;
  display:flex;flex:1;overflow:hidden;
}

/* SIDEBAR - STYLE CYBERPUNK AVEC TOUS LES ALGOS */
.sidebar{
  width:260px;flex-shrink:0;
  background:rgba(11,17,32,0.9);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-section{margin-bottom:4px}
.sidebar-header{
  padding:10px 16px 6px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--text3);
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}
.sidebar-header::after{content:'';flex:1;height:1px;background:var(--border)}
.algo-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;
  cursor:pointer;
  border:none;background:none;
  color:var(--text2);
  font-family:'Exo 2',sans-serif;
  font-size:12px;
  width:100%;text-align:left;
  transition:all 0.15s;
  border-left:2px solid transparent;
  position:relative;
  overflow:hidden;
}
.algo-btn::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:0;
  background:rgba(0,212,255,0.06);
  transition:width 0.2s;
}
.algo-btn:hover::before{width:100%}
.algo-btn:hover{color:var(--text);border-left-color:var(--border2)}
.algo-btn.active{
  color:var(--cyan);
  border-left-color:var(--cyan);
  background:rgba(0,212,255,0.08);
  font-weight:500;
}
.algo-icon{
  width:24px;height:24px;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
}
.algo-badge{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:8px;
  padding:2px 6px;
  border-radius:3px;
  background:rgba(0,212,255,0.1);
  color:var(--cyan);
  border:1px solid rgba(0,212,255,0.2);
}
.algo-badge.green{background:rgba(0,255,136,0.1);color:var(--green)}
.algo-badge.amber{background:rgba(255,179,0,0.1);color:var(--amber)}
.algo-badge.purple{background:rgba(168,85,247,0.1);color:var(--purple)}
.algo-badge.red{background:rgba(255,64,96,0.1);color:var(--red)}

/* CENTER PANEL */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px}
.panel{
  background:rgba(11,17,32,0.8);
  border:1px solid var(--border);
  border-radius:10px;
  backdrop-filter:blur(8px);
  overflow:hidden;
}
.panel-head{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:rgba(15,25,41,0.6);
}
.panel-title{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text2);
  letter-spacing:1px;
}
.dot-red{width:10px;height:10px;border-radius:50%;background:#ff5f57}
.dot-amber{width:10px;height:10px;border-radius:50%;background:#febc2e}
.dot-green{width:10px;height:10px;border-radius:50%;background:#28c840}
.panel-body{padding:12px 16px}

/* INPUTS */
.input-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
label.ilab{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text3);
}
input.key-in{
  flex:1;min-width:180px;
  background:rgba(15,25,41,0.8);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:7px 12px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  outline:none;
}
input.key-in:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,0.15)}
.mode-toggle{display:flex;gap:4px}
.mode-btn{
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:5px;
  background:none;
  color:var(--text2);
  font-family:'Exo 2',sans-serif;
  font-size:12px;
  cursor:pointer;
  transition:all 0.15s;
}
.mode-btn.active{
  background:rgba(0,212,255,0.12);
  border-color:var(--cyan);
  color:var(--cyan);
}
textarea.crypto-ta{
  width:100%;
  background:rgba(7,11,20,0.8);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:12px;
  outline:none;
  resize:none;
}
textarea.crypto-ta:focus{border-color:var(--cyan2);box-shadow:0 0 0 2px rgba(0,212,255,0.1)}

/* EXECUTE BUTTON */
.exec-btn{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--green2);
  background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,212,255,0.08));
  color:var(--green);
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.exec-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;right:-100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,0.1),transparent);
  transition:left 0.4s;
}
.exec-btn:hover{
  border-color:var(--green);
  color:#fff;
  box-shadow:0 0 24px rgba(0,255,136,0.2);
}
.exec-btn:active{transform:scale(0.99)}
.exec-btn.loading{color:var(--cyan);border-color:var(--cyan)}

/* OUTPUT */
.output-wrap{position:relative;flex:1;min-height:0}
#output{
  width:100%;height:100%;min-height:120px;
  background:rgba(4,8,15,0.9);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--green);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:14px;
  outline:none;
  resize:none;
  white-space:pre-wrap;
  word-break:break-all;
}
.output-actions{position:absolute;top:8px;right:8px;display:flex;gap:6px}
.act-btn{
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:4px;
  background:rgba(11,17,32,0.9);
  color:var(--text3);
  font-size:10px;
  cursor:pointer;
}
.act-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.file-btn{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:5px;
  background:rgba(0,212,255,0.04);
  color:var(--text2);
  font-size:11px;
  cursor:pointer;
}
.file-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* RIGHT LOG PANEL */
.right-panel{
  width:300px;flex-shrink:0;
  background:rgba(9,14,24,0.9);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.log-head{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text2);
  display:flex;
  align-items:center;
  gap:8px;
}
.log-body{
  flex:1;overflow-y:auto;
  padding:8px;
}
.log-entry{
  padding:6px 8px;
  margin-bottom:4px;
  border-radius:5px;
  background:rgba(15,25,41,0.5);
  border:1px solid rgba(30,58,95,0.4);
  font-size:10px;
}
.log-time{color:var(--text3)}
.log-msg{color:var(--text2);margin-top:2px}
.log-msg.success{color:var(--green)}
.log-msg.error{color:var(--red)}
.log-msg.info{color:var(--cyan)}
.log-footer{
  padding:8px;
  border-top:1px solid var(--border);
}
.clear-log{
  width:100%;
  padding:6px;
  border:1px solid var(--border);
  border-radius:5px;
  background:none;
  color:var(--text3);
  font-size:10px;
  cursor:pointer;
}
.clear-log:hover{border-color:var(--red);color:var(--red)}

/* STATUS BAR */
.statusbar{
  position:relative;z-index:10;
  padding:5px 20px;
  background:rgba(7,11,20,0.97);
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  font-size:10px;
  color:var(--text3);
}
#status-msg{color:var(--green)}
.toast{
  position:fixed;
  bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:8px 20px;
  background:rgba(11,17,32,0.95);
  border:1px solid var(--green);
  border-radius:6px;
  color:var(--green);
  font-size:12px;
  opacity:0;
  transition:all 0.3s;
  z-index:999;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#fileInput{display:none}
.info-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.info-tag{
  font-size:9px;
  padding:3px 8px;
  border-radius:4px;
  background:rgba(30,58,95,0.4);
  color:var(--text3);
  border:1px solid var(--border);
}
.algo-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  border-radius:20px;
  background:rgba(0,212,255,0.06);
  border:1px solid rgba(0,212,255,0.15);
  font-size:10px;
  color:var(--cyan);
}
@media(max-width:1100px){
  .right-panel{width:240px}
  .sidebar{width:220px}
}
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <div class="logo-text">CRYPTOSUITE</div>
      <div class="logo-sub">TP1 → TP6 · COMPLETE ALGORITHMS</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><span class="hstat-val" id="ops-count">0</span><span class="hstat-lbl">Ops</span></div>
    <div class="hstat"><span class="hstat-val" id="last-ms">—</span><span class="hstat-lbl">Last ms</span></div>
    <div class="hstat"><div class="status-dot"></div><span class="hstat-lbl">ONLINE</span></div>
  </div>
</header>

<main>
<!-- SIDEBAR - TOUS LES ALGORITHMES DES TP1 À TP6 -->
<aside class="sidebar">
  <!-- TP1 · Chiffrement Classique -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP1 · CLASSIQUE</div>
    <button class="algo-btn" onclick="setAlgo(this,'cesar')"><span class="algo-icon">Cæ</span>César<span class="algo-badge">+3</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'vigenere')"><span class="algo-icon">V</span>Vigenère<span class="algo-badge">Kasiski</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'hill')"><span class="algo-icon">H</span>Hill 2x2<span class="algo-badge">matrice</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'playfair')"><span class="algo-icon">Pf</span>Playfair<span class="algo-badge">digrammes</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'railfence')"><span class="algo-icon">Rf</span>Rail Fence<span class="algo-badge">transposition</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'otp')"><span class="algo-icon">∞</span>OTP<span class="algo-badge green">parfait</span></button>
  </div>

  <!-- TP2 · Chiffrement Symétrique Moderne -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP2 · SYMÉTRIQUE</div>
    <button class="algo-btn" onclick="setAlgo(this,'rc4')"><span class="algo-icon">R4</span>RC4<span class="algo-badge">stream</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'des')"><span class="algo-icon">DES</span>DES<span class="algo-badge">56b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'tdes')"><span class="algo-icon">3D</span>3DES<span class="algo-badge">112b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'aes128')"><span class="algo-icon">A12</span>AES-128<span class="algo-badge">128b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'aes256')"><span class="algo-icon">A25</span>AES-256<span class="algo-badge green">256b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'twofish')"><span class="algo-icon">Tf</span>Twofish<span class="algo-badge">finaliste</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'serpent')"><span class="algo-icon">Sp</span>Serpent<span class="algo-badge green">sécurité</span></button>
  </div>

  <!-- TP3 · Chiffrement Asymétrique -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP3 · ASYMÉTRIQUE</div>
    <button class="algo-btn" onclick="setAlgo(this,'rsa')"><span class="algo-icon">RSA</span>RSA<span class="algo-badge purple">2048b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'dh')"><span class="algo-icon">DH</span>Diffie-Hellman<span class="algo-badge">MITM</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'elgamal')"><span class="algo-icon">El</span>ElGamal<span class="algo-badge">malléable</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'ecc')"><span class="algo-icon">ECC</span>ECC P-256<span class="algo-badge green">3072b eq</span></button>
  </div>

  <!-- TP4 · Hachage -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP4 · HACHAGE</div>
    <button class="algo-btn" onclick="setAlgo(this,'md5')"><span class="algo-icon">#5</span>MD5<span class="algo-badge amber">128b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'sha256')"><span class="algo-icon">S2</span>SHA-256<span class="algo-badge">256b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'sha512')"><span class="algo-icon">S5</span>SHA-512<span class="algo-badge green">512b</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'hmac')"><span class="algo-icon">HM</span>HMAC<span class="algo-badge">MAC</span></button>
  </div>

  <!-- TP5 · Signatures -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP5 · SIGNATURES</div>
    <button class="algo-btn" onclick="setAlgo(this,'rsa_sign')"><span class="algo-icon">RS</span>RSA-PSS<span class="algo-badge purple">sign</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'dsa')"><span class="algo-icon">DS</span>DSA<span class="algo-badge">NIST</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'ecdsa')"><span class="algo-icon">EC</span>ECDSA<span class="algo-badge green">courbe</span></button>
  </div>

  <!-- TP6 · Applications -->
  <div class="sidebar-section">
    <div class="sidebar-header">TP6 · APPLICATIONS</div>
    <button class="algo-btn" onclick="setAlgo(this,'bluetooth')"><span class="algo-icon">🔵</span>Bluetooth<span class="algo-badge">ECDH</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'wifi')"><span class="algo-icon">📡</span>Wi-Fi WPA2<span class="algo-badge">4-Way</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'vote')"><span class="algo-icon">🗳️</span>Vote électronique<span class="algo-badge green">RSA</span></button>
    <button class="algo-btn" onclick="setAlgo(this,'homomorphic')"><span class="algo-icon">➕</span>Vote homomorphique<span class="algo-badge purple">Paillier</span></button>
  </div>
</aside>

<!-- CENTER PANEL -->
<section class="center">
  <div class="panel" style="flex-shrink:0">
    <div class="panel-head">
      <div class="dot-red"></div><div class="dot-amber"></div><div class="dot-green"></div>
      <span class="panel-title">INPUT</span>
      <span id="algo-chip-label" class="algo-chip" style="margin-left:auto">CÉSAR</span>
      <label class="file-btn" for="fileInput">📁 Charger</label>
      <input type="file" id="fileInput" accept=".txt,*" onchange="loadFile(this)"/>
      <button class="act-btn" onclick="clearInput()">✕ Effacer</button>
    </div>
    <div class="panel-body">
      <div class="info-bar" id="info-bar">
        <span class="info-tag" id="info-type">Chiffrement par décalage</span>
        <span class="info-tag" id="info-key">Clé: décalage 1-25</span>
      </div>
      <div class="input-row">
        <label class="ilab">CLÉ :</label>
        <input class="key-in" id="key" value="3" placeholder="Clé..."/>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-enc" onclick="setMode('encrypt',this)">⬆ Chiffrer</button>
          <button class="mode-btn" id="btn-dec" onclick="setMode('decrypt',this)">⬇ Déchiffrer</button>
        </div>
      </div>
      <textarea class="crypto-ta" id="input-text" rows="5" placeholder="Entrez votre texte ici..."></textarea>
    </div>
  </div>

  <button class="exec-btn" id="exec-btn" onclick="execute()">▶ EXÉCUTER</button>

  <div class="panel" style="flex:1;display:flex;flex-direction:column">
    <div class="panel-head">
      <div class="dot-red"></div><div class="dot-amber"></div><div class="dot-green"></div>
      <span class="panel-title">OUTPUT</span>
      <div class="output-actions" style="position:relative;top:auto;right:auto;margin-left:auto">
        <button class="act-btn" onclick="copyOutput()">📋 Copier</button>
        <button class="act-btn" onclick="saveOutput()">💾 Sauvegarder</button>
      </div>
    </div>
    <div class="panel-body" style="flex:1;min-height:0">

// ==================== ALGORITHMES DE BASE ====================
function cesarOp(text, shift, encrypt) {
  const s = encrypt ? shift : -shift;
  return [...text].map(c=>{
    if(!c.match(/[a-zA-Z]/)) return c;
    const base = c<='Z'?65:97;
    return String.fromCharCode(((c.charCodeAt(0)-base+s)%26+26)%26+base);
  }).join('');
}

function vigenereOp(text, key, encrypt) {
  const k = key.toUpperCase().replace(/[^A-Z]/g,'') || 'A';
  let ki=0;
  return [...text].map(c=>{
    if(!c.match(/[a-zA-Z]/)) return c;
    const base = c<='Z'?65:97;
    const sh = k.charCodeAt(ki%k.length)-65;
    ki++;
    const shift = encrypt ? sh : -sh;
    return String.fromCharCode(((c.charCodeAt(0)-base+shift)%26+26)%26+base);
  }).join('');
}

function hillOp(text, key, encrypt) {
  // Hill simplifié 2x2
  const nums = key.split(',').map(Number);
  if(nums.length<4) return 'Erreur: matrice 2x2 requise (ex: 3,3,2,5)';
  const a=nums[0],b=nums[1],c=nums[2],d=nums[3];
  const det = (a*d - b*c) % 26;
  if(det<0) det+=26;
  let detInv = -1;
  for(let i=1;i<26;i++) if((det*i)%26===1){detInv=i;break;}
  if(detInv===-1) return 'Erreur: matrice non inversible';
  let ma,mb,mc,md;
  if(encrypt){ ma=a;mb=b;mc=c;md=d; }
  else{ ma=(d*detInv)%26; mb=(-b*detInv)%26; mc=(-c*detInv)%26; md=(a*detInv)%26; }
  let clean = text.toUpperCase().replace(/[^A-Z]/g,'');
  if(clean.length%2) clean+='X';
  let result='';
  for(let i=0;i<clean.length;i+=2){
    const p1=clean.charCodeAt(i)-65, p2=clean.charCodeAt(i+1)-65;
    const c1=(ma*p1+mb*p2)%26, c2=(mc*p1+md*p2)%26;
    result+=String.fromCharCode(c1+65)+String.fromCharCode(c2+65);
  }
  return result;
}

function playfairOp(text, key, encrypt) {
  let k = key.toUpperCase().replace(/J/g,'I');
  let grid=[];
  let seen=new Set();
  for(let c of k+'ABCDEFGHIKLMNOPQRSTUVWXYZ'){
    if(!seen.has(c) && c.match(/[A-Z]/)){ grid.push(c); seen.add(c); }
  }
  const mat=[]; for(let i=0;i<5;i++) mat.push(grid.slice(i*5,i*5+5));
  function pos(ch){ for(let i=0;i<5;i++) for(let j=0;j<5;j++) if(mat[i][j]===ch) return[i,j]; return[0,0]; }
  let clean = text.toUpperCase().replace(/[^A-Z]/g,'').replace(/J/g,'I');
  let pairs=[];
  for(let i=0;i<clean.length;i+=2){
    if(i===clean.length-1) pairs.push(clean[i]+'X');
    else if(clean[i]===clean[i+1]){ pairs.push(clean[i]+'X'); i--; }
    else pairs.push(clean[i]+clean[i+1]);
  }
  let result='';
  for(let [a,b] of pairs){
    let [r1,c1]=pos(a), [r2,c2]=pos(b);
    if(r1===r2){
      result+=mat[r1][(c1+(encrypt?1:4))%5]+mat[r2][(c2+(encrypt?1:4))%5];
    }else if(c1===c2){
      result+=mat[(r1+(encrypt?1:4))%5][c1]+mat[(r2+(encrypt?1:4))%5][c2];
    }else{
      result+=mat[r1][c2]+mat[r2][c1];
    }
  }
  return result;
}

function railfenceOp(text, rails, encrypt) {
  if(encrypt){
    const fence=Array(rails).fill().map(()=>[]);
    let dir=1, rail=0;
    for(let c of text){
      fence[rail].push(c);
      rail+=dir;
      if(rail===rails-1||rail===0) dir*=-1;
    }
    return fence.map(r=>r.join('')).join('');
  } else {
    const len=text.length;
    const fence=Array(rails).fill().map(()=>[]);
    let dir=1, rail=0;
    for(let i=0;i<len;i++){
      fence[rail].push(i);
      rail+=dir;
      if(rail===rails-1||rail===0) dir*=-1;
    }
    const order=fence.flat();
    const result=Array(len);
    for(let i=0;i<len;i++) result[order[i]]=text[i];
    return result.join('');
  }
}

function rc4Op(data, key, encrypt) {
  const kb=[...key].map(c=>c.charCodeAt(0));
  const S=[...Array(256).keys()];
  let j=0;
  for(let i=0;i<256;i++){ j=(j+S[i]+kb[i%kb.length])%256; [S[i],S[j]]=[S[j],S[i]]; }
  const bytes = encrypt ? [...data].map(c=>c.charCodeAt(0)) : data.match(/../g).map(h=>parseInt(h,16));
  let i2=0,j2=0;
  const out=bytes.map(b=>{
    i2=(i2+1)%256; j2=(j2+S[i2])%256;
    [S[i2],S[j2]]=[S[j2],S[i2]];
    return b^S[(S[i2]+S[j2])%256];
  });
  return encrypt ? out.map(b=>b.toString(16).padStart(2,'0')).join('') : out.map(b=>String.fromCharCode(b)).join('');
}

async function shaOp(text, algo) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest(algo, enc.encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hmacOp(text, key) {
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey('raw', enc.encode(key), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, enc.encode(text));
  return [...new Uint8Array(sig)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function execute() {
  const text = document.getElementById('input-text').value.trim();
  const key = document.getElementById('key').value;
  if(!text && currentAlgo!=='dh'){ showToast('⚠ Entrez un texte!'); return; }

  const btn = document.getElementById('exec-btn');
  btn.classList.add('loading');
  btn.textContent = '⏳ TRAITEMENT...';
  const t0 = performance.now();
  let result = '';

  try {
    switch(currentAlgo){
      case 'cesar':{
        const shift = parseInt(key)||3;
        result = cesarOp(text, shift, currentMode==='encrypt');
        break;
      }
      case 'vigenere':
        result = vigenereOp(text, key, currentMode==='encrypt');
        break;
      case 'hill':
        result = hillOp(text, key, currentMode==='encrypt');
        break;
      case 'playfair':
        result = playfairOp(text, key, currentMode==='encrypt');
        break;
      case 'railfence':{
        const rails = parseInt(key)||3;
        result = railfenceOp(text, rails, currentMode==='encrypt');
        break;
      }
      case 'otp':
        if(currentMode==='encrypt'){
          const bytes=new Uint8Array(new TextEncoder().encode(text));
          const rand=new Uint8Array(bytes.length);
          crypto.getRandomValues(rand);
          const cipher=[...bytes].map((b,i)=>b^rand[i]);
          result=`CHIFFRÉ: ${cipher.map(b=>b.toString(16).padStart(2,'0')).join('')}\nCLÉ OTP: ${[...rand].map(b=>b.toString(16).padStart(2,'0')).join('')}\n\n⚠ Conservez la clé!`;
        } else result='OTP déchiffrement: XOR chiffré ⊕ clé';
        break;
      case 'rc4':
        result = rc4Op(text, key, currentMode==='encrypt');
        break;
      case 'des':
      case 'tdes':
        result = desSimulate(text, key, currentMode==='encrypt');
        break;
      case 'aes128':
      case 'aes256':
        result = aesSimulate(text, key, currentMode==='encrypt');
        break;
      case 'twofish':
        result = twofishSimulate(text, key);
        break;
      case 'serpent':
        result = serpentSimulate(text, key);
        break;
      case 'rsa':
        result = rsaSimulate(text, key, currentMode==='encrypt');
        break;
      case 'dh':
        result = dhSimulate();
        break;
      case 'elgamal':
        result = elgamalSimulate(text);
        break;
      case 'ecc':
        result = eccSimulate();
        break;
      case 'md5':
        result = md5Op(text);
        break;
      case 'sha256':
        result = await shaOp(text, 'SHA-256');
        break;
      case 'sha512':
        result = await shaOp(text, 'SHA-512');
        break;
      case 'hmac':
        result = await hmacOp(text, key);
        break;
      case 'rsa_sign':
      case 'dsa':
      case 'ecdsa':
        result = signatureSimulate(text, algoInfo[currentAlgo].label);
        break;
      case 'bluetooth':
      case 'wifi':
      case 'vote':
      case 'homomorphic':
        result = netTexts[currentAlgo];
        break;
      default:
        result = `⚠ Algorithme ${currentAlgo} - Implémentation Web UI`;
    }

    const elapsed = performance.now()-t0;
    document.getElementById('output').value = result;
    document.getElementById('perf-ms').textContent = elapsed.toFixed(2)+'ms';
    document.getElementById('last-ms').textContent = elapsed.toFixed(1);
    opsCount++;
    document.getElementById('ops-count').textContent = opsCount;
    log(`${algoInfo[currentAlgo].label} → ${currentMode} terminé (${elapsed.toFixed(2)}ms)`, 'success');
  } catch(e){
    document.getElementById('output').value = '❌ Erreur: '+e.message;
    log('Erreur: '+e.message, 'error');
  }

  btn.classList.remove('loading');
  btn.textContent = '▶ EXÉCUTER';
}

// ==================== UTILITAIRES ====================
function loadFile(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ document.getElementById('input-text').value=e.target.result; log(`Fichier chargé: ${f.name}`,'info'); };
  r.readAsText(f);
}
function clearInput(){ document.getElementById('input-text').value=''; log('Entrée effacée','warn'); }
function copyOutput(){
  const v=document.getElementById('output').value;
  if(v){ navigator.clipboard.writeText(v); showToast('✅ Copié!'); }
}
function saveOutput(){
  const v=document.getElementById('output').value;
  if(v){
    const a=document.createElement('a');
    a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(v);
    a.download='cryptosuite_output.txt';
    a.click();
    log('Fichier sauvegardé','success');
  }
}

let logCount=0;
function log(msg,type=''){
  logCount++;
  document.getElementById('log-count').textContent=logCount;
  const now=new Date().toTimeString().slice(0,8);
  const div=document.createElement('div');
  div.className='log-entry';
  div.innerHTML=`<div class="log-time">${now}</div><div class="log-msg ${type}">${msg}</div>`;
  document.getElementById('log-body').appendChild(div);
  document.getElementById('log-body').scrollTop=document.getElementById('log-body').scrollHeight;
}
function clearLog(){
  document.getElementById('log-body').innerHTML='';
  logCount=0;
  document.getElementById('log-count').textContent='0';
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='Enter') execute(); });
