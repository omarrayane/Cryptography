<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CryptoSuite - TP1 à TP6 Complet</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b14;--cyan:#00d4ff;--green:#00ff88;--red:#ff4060;--amber:#ffb300;--purple:#a855f7;--text:#d4e8ff}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:14px 24px;background:rgba(11,17,32,0.95);border-bottom:1px solid #1e3a5f}
.logo-text{font-family:'Orbitron',monospace;font-size:20px;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:rgba(11,17,32,0.9);border-right:1px solid #1e3a5f;overflow-y:auto}
.sidebar-header{padding:10px 16px;font-size:9px;color:#3d6b8f;text-transform:uppercase}
.algo-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;background:none;border:none;color:#7fa8cc;width:100%;text-align:left;border-left:2px solid transparent}
.algo-btn.active{color:var(--cyan);border-left-color:var(--cyan);background:rgba(0,212,255,0.08)}
.algo-icon{width:24px}
.center{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.panel{background:rgba(11,17,32,0.8);border:1px solid #1e3a5f;border-radius:10px}
.panel-head{padding:10px 16px;border-bottom:1px solid #1e3a5f;font-weight:bold}
.panel-body{padding:12px 16px}
input,textarea,select{background:rgba(15,25,41,0.8);border:1px solid #2a4f7a;border-radius:6px;padding:8px;color:var(--text);font-family:'JetBrains Mono',monospace}
textarea{width:100%;resize:vertical}
.exec-btn{width:100%;padding:12px;border:1px solid var(--green);background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,212,255,0.08));color:var(--green);font-family:'Orbitron',monospace;font-weight:700;cursor:pointer}
#output{width:100%;min-height:400px;background:rgba(4,8,15,0.9);border:1px solid #1e3a5f;border-radius:6px;color:var(--green);font-family:'JetBrains Mono',monospace;padding:14px;white-space:pre-wrap;overflow:auto}
.right-panel{width:320px;background:rgba(9,14,24,0.9);border-left:1px solid #1e3a5f;display:flex;flex-direction:column}
.log-body{flex:1;overflow-y:auto;padding:8px;height:300px}
.log-entry{padding:6px;margin-bottom:4px;background:rgba(15,25,41,0.5);border-radius:5px;font-size:10px}
.log-msg.success{color:var(--green)}.log-msg.error{color:var(--red)}.log-msg.info{color:var(--cyan)}
.statusbar{padding:5px 20px;background:rgba(7,11,20,0.97);border-top:1px solid #1e3a5f;font-size:10px}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;color:#3d6b8f;margin-bottom:4px}
.input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mode-btn{padding:6px 14px;border:1px solid #1e3a5f;background:none;color:#7fa8cc;cursor:pointer}
.mode-btn.active{background:rgba(0,212,255,0.12);border-color:var(--cyan);color:var(--cyan)}
.hidden{display:none}
select{width:100%}
.button-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.small-btn{padding:6px 12px;border:1px solid var(--cyan);background:none;color:var(--cyan);cursor:pointer;border-radius:5px}
.small-btn:hover{background:rgba(0,212,255,0.1)}
</style>
</head>
<body>
<header><div class="logo-text">🔐 CRYPTOSUITE · TP1 → TP6 COMPLET</div></header>
<main>
<aside class="sidebar" id="sidebar"></aside>
<section class="center">
  <div class="panel">
    <div class="panel-head">📝 CONFIGURATION & ENTRÉE</div>
    <div class="panel-body">
      
      <!-- Zone texte principale -->
      <div class="input-group">
        <label>📄 TEXTE / MESSAGE</label>
        <textarea id="input-text" rows="3" placeholder="Entrez votre texte ici..."></textarea>
      </div>
      
      <!-- TP1: César -->
      <div id="cesar-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeWith('cesar', 'normal', 'encrypt')">🔒 Chiffrer</button>
          <button class="small-btn" onclick="executeWith('cesar', 'normal', 'decrypt')">🔓 Déchiffrer</button>
          <button class="small-btn" style="border-color:var(--amber)" onclick="executeWith('cesar', 'bruteforce', '')">🔓 Force brute (26 clés)</button>
          <button class="small-btn" style="border-color:var(--purple)" onclick="executeWith('cesar', 'ic', '')">📊 Indice coïncidence</button>
        </div>
      </div>
      
      <!-- TP1: Vigenère -->
      <div id="vigenere-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeWith('vigenere', 'normal', 'encrypt')">🔒 Chiffrer</button>
          <button class="small-btn" onclick="executeWith('vigenere', 'normal', 'decrypt')">🔓 Déchiffrer</button>
          <button class="small-btn" style="border-color:var(--amber)" onclick="executeWith('vigenere', 'attack', '')">🔓 Attaque Kasiski+IC</button>
        </div>
      </div>
      
      <!-- TP2: RC4 -->
      <div id="rc4-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeWith('rc4', 'normal', 'encrypt')">🔒 Chiffrer</button>
          <button class="small-btn" onclick="executeWith('rc4', 'normal', 'decrypt')">🔓 Déchiffrer</button>
          <button class="small-btn" style="border-color:var(--amber)" onclick="executeWith('rc4', 'wep', '')">⚠️ Vulnérabilité WEP</button>
        </div>
      </div>
      
      <!-- TP2: DES -->
      <div id="des-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeWith('des', 'ecb', 'encrypt')">🔒 DES-ECB</button>
          <button class="small-btn" onclick="executeWith('des', 'cbc', 'encrypt')">🔒 DES-CBC</button>
          <button class="small-btn" onclick="executeWith('des', 'ecb', 'decrypt')">🔓 Déchiffrer</button>
        </div>
      </div>
      
      <!-- TP2: AES -->
      <div id="aes-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeWith('aes128', 'normal', 'encrypt')">🔒 AES-128</button>
          <button class="small-btn" onclick="executeWith('aes256', 'normal', 'encrypt')">🔒 AES-256</button>
          <button class="small-btn" onclick="executeWith('aes256', 'avalanche', '')">🌋 Effet avalanche</button>
          <button class="small-btn" style="border-color:var(--amber)" onclick="executeWith('aes256', 'nonce', '')">⚠️ Nonce-reuse</button>
        </div>
      </div>
      
      <!-- TP3: Diffie-Hellman -->
      <div id="dh-extra" class="hidden">
        <div class="input-row">
          <input id="dh-p" placeholder="p" value="23" style="width:70px">
          <input id="dh-g" placeholder="g" value="5" style="width:70px">
          <input id="dh-a" placeholder="a" value="6" style="width:70px">
          <input id="dh-b" placeholder="b" value="15" style="width:70px">
        </div>
        <div class="button-group">
          <button class="small-btn" onclick="executeDH('normal')">🔐 Échange normal</button>
          <button class="small-btn" style="border-color:var(--amber)" onclick="executeDH('mitm')">⚠️ Attaque MITM</button>
          <button class="small-btn" style="border-color:var(--green)" onclick="executeDH('auth')">✅ DH authentifié</button>
        </div>
      </div>
      
      <!-- TP3: RSA -->
      <div id="rsa-extra" class="hidden">
        <div class="input-row">
          <input id="rsa-p" placeholder="p" value="61" style="width:80px">
          <input id="rsa-q" placeholder="q" value="53" style="width:80px">
        </div>
        <div class="button-group">
          <button class="small-btn" onclick="executeRSA('encrypt')">🔒 Chiffrer</button>
          <button class="small-btn" onclick="executeRSA('decrypt')">🔓 Déchiffrer</button>
          <button class="small-btn" onclick="executeRSA('sign')">✍️ Signer</button>
        </div>
      </div>
      
      <!-- TP4: Hachage -->
      <div id="hash-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeHash('md5')">MD5</button>
          <button class="small-btn" onclick="executeHash('sha256')">SHA-256</button>
          <button class="small-btn" onclick="executeHash('sha512')">SHA-512</button>
          <button class="small-btn" onclick="executeHash('hmac')">HMAC</button>
        </div>
      </div>
      
      <!-- TP5: Signatures -->
      <div id="sign-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" onclick="executeSign('rsa_sign')">✍️ RSA-PSS</button>
          <button class="small-btn" onclick="executeSign('dsa')">✍️ DSA</button>
          <button class="small-btn" onclick="executeSign('ecdsa')">✍️ ECDSA</button>
        </div>
      </div>
      
      <!-- TP6: Applications -->
      <div id="app-extra" class="hidden">
        <div class="button-group">
          <button class="small-btn" style="border-color:var(--cyan)" onclick="executeApp('bluetooth')">🔵 Bluetooth (complet)</button>
          <button class="small-btn" style="border-color:var(--cyan)" onclick="executeApp('wifi')">📡 Wi-Fi WPA2</button>
          <button class="small-btn" style="border-color:var(--green)" onclick="executeApp('vote')">🗳️ Vote électronique</button>
          <button class="small-btn" style="border-color:var(--purple)" onclick="executeApp('homomorphic')">🧮 Vote homomorphique</button>
        </div>
      </div>
      
      <!-- Clé -->
      <div id="key-group" class="input-group">
        <label>🔑 CLÉ</label>
        <input id="key" value="3" placeholder="Clé...">
      </div>
      
    </div>
  </div>
  
  <button class="exec-btn" id="exec-btn" onclick="execute()">▶ EXÉCUTER</button>
  
  <div class="panel">
    <div class="panel-head">📤 RÉSULTAT</div>
    <div class="panel-body">
      <textarea id="output" readonly placeholder="// Résultat..."></textarea>
    </div>
  </div>
</section>
<aside class="right-panel">
  <div class="panel-head">📋 JOURNAL</div>
  <div class="log-body" id="log-body"></div>
  <div style="padding:8px"><button onclick="clearLog()" style="width:100%;padding:6px;background:none;border:1px solid #1e3a5f;color:#7fa8cc">Effacer</button></div>
</aside>
</main>
<div class="statusbar"><span id="status-msg">✅ Prêt</span></div>

<script>
let currentAlgo = 'cesar';

const algoConfig = {
  cesar: { extra: 'cesar-extra', hasKey: true },
  vigenere: { extra: 'vigenere-extra', hasKey: true },
  hill: { extra: null, hasKey: true },
  playfair: { extra: null, hasKey: true },
  railfence: { extra: null, hasKey: true },
  otp: { extra: null, hasKey: false },
  rc4: { extra: 'rc4-extra', hasKey: true },
  des: { extra: 'des-extra', hasKey: true },
  tdes: { extra: null, hasKey: true },
  aes128: { extra: 'aes-extra', hasKey: true },
  aes256: { extra: 'aes-extra', hasKey: true },
  twofish: { extra: null, hasKey: true },
  serpent: { extra: null, hasKey: true },
  rsa: { extra: 'rsa-extra', hasKey: false },
  dh: { extra: 'dh-extra', hasKey: false },
  elgamal: { extra: null, hasKey: false },
  ecc: { extra: null, hasKey: false },
  md5: { extra: 'hash-extra', hasKey: false },
  sha256: { extra: 'hash-extra', hasKey: false },
  sha512: { extra: 'hash-extra', hasKey: false },
  hmac: { extra: 'hash-extra', hasKey: true },
  rsa_sign: { extra: 'sign-extra', hasKey: false },
  dsa: { extra: 'sign-extra', hasKey: false },
  ecdsa: { extra: 'sign-extra', hasKey: false },
  bluetooth: { extra: 'app-extra', hasKey: false },
  wifi: { extra: 'app-extra', hasKey: false },
  vote: { extra: 'app-extra', hasKey: false },
  homomorphic: { extra: 'app-extra', hasKey: false }
};

const algoNames = {
  cesar:'César', vigenere:'Vigenère', hill:'Hill', playfair:'Playfair',
  railfence:'Rail Fence', otp:'OTP', rc4:'RC4', des:'DES', tdes:'3DES',
  aes128:'AES-128', aes256:'AES-256', twofish:'Twofish', serpent:'Serpent',
  rsa:'RSA', dh:'Diffie-Hellman', elgamal:'ElGamal', ecc:'ECC',
  md5:'MD5', sha256:'SHA-256', sha512:'SHA-512', hmac:'HMAC',
  rsa_sign:'RSA-PSS', dsa:'DSA', ecdsa:'ECDSA',
  bluetooth:'Bluetooth', wifi:'Wi-Fi', vote:'Vote', homomorphic:'Homomorphique'
};

const algoCategories = {
  'TP1 · Classique': ['cesar','vigenere','hill','playfair','railfence','otp'],
  'TP2 · Symétrique': ['rc4','des','tdes','aes128','aes256','twofish','serpent'],
  'TP3 · Asymétrique': ['rsa','dh','elgamal','ecc'],
  'TP4 · Hachage': ['md5','sha256','sha512','hmac'],
  'TP5 · Signatures': ['rsa_sign','dsa','ecdsa'],
  'TP6 · Applications': ['bluetooth','wifi','vote','homomorphic']
};

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  for(const [cat, algos] of Object.entries(algoCategories)){
    const div = document.createElement('div');
    div.innerHTML = `<div class="sidebar-header">${cat}</div>`;
    for(const algo of algos){
      const btn = document.createElement('button');
      btn.className = 'algo-btn' + (algo === currentAlgo ? ' active' : '');
      btn.innerHTML = `<span class="algo-icon">${algoNames[algo][0]}</span>${algoNames[algo]}`;
      btn.onclick = () => setAlgo(algo, btn);
      div.appendChild(btn);
    }
    sidebar.appendChild(div);
  }
}

function setAlgo(algo, btn) {
  currentAlgo = algo;
  document.querySelectorAll('.algo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  document.querySelectorAll('[id$="-extra"]').forEach(el => el.classList.add('hidden'));
  const config = algoConfig[algo];
  if(config && config.extra) document.getElementById(config.extra).classList.remove('hidden');
  
  const keyGroup = document.getElementById('key-group');
  if(config && config.hasKey) keyGroup.classList.remove('hidden');
  else keyGroup.classList.add('hidden');
  
  log(`Algorithme: ${algoNames[algo]}`, 'info');
}

async function execute() {
  const text = document.getElementById('input-text').value.trim();
  if(!text && !['dh','bluetooth','wifi','vote','homomorphic','ecc','elgamal'].includes(currentAlgo)){
    log('⚠️ Entrez un texte!', 'error');
    return;
  }
  executeWith(currentAlgo, 'normal', 'encrypt');
}

async function executeWith(algo, option, mode) {
  const text = document.getElementById('input-text').value.trim();
  const key = document.getElementById('key').value;
  
  let dh_p = document.getElementById('dh-p')?.value || '23';
  let dh_g = document.getElementById('dh-g')?.value || '5';
  let dh_a = document.getElementById('dh-a')?.value || '6';
  let dh_b = document.getElementById('dh-b')?.value || '15';
  let rsa_p = document.getElementById('rsa-p')?.value || '61';
  let rsa_q = document.getElementById('rsa-q')?.value || '53';
  
  let payload = {
    algo: algo,
    text: text,
    key: key,
    mode: mode,
    cesarMode: option === 'bruteforce' ? 'bruteforce' : (option === 'ic' ? 'ic' : 'normal'),
    vigenereMode: option === 'attack' ? 'attack' : 'normal',
    rc4Mode: option === 'wep' ? 'wep' : 'normal',
    desMode: option === 'cbc' ? 'cbc' : 'ecb',
    aesMode: option === 'avalanche' ? 'avalanche' : (option === 'nonce' ? 'nonce' : 'normal'),
    dhMode: option,
    rsaMode: mode === 'sign' ? 'sign' : 'normal',
    dh_p: dh_p, dh_g: dh_g, dh_a: dh_a, dh_b: dh_b,
    rsa_p: rsa_p, rsa_q: rsa_q
  };
  
  document.getElementById('status-msg').innerHTML = '⏳ Traitement...';
  const btn = document.querySelector('.exec-btn');
  btn.disabled = true;
  
  try {
    const response = await fetch('http://localhost:5000/api/execute', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if(data.success){
      document.getElementById('output').value = data.result;
      log(`${algoNames[algo]} terminé ✓`, 'success');
    } else {
      document.getElementById('output').value = `❌ Erreur: ${data.error}`;
      log(`Erreur: ${data.error}`, 'error');
    }
  } catch(e){
    document.getElementById('output').value = `❌ Erreur: ${e.message}\n\nLancez: python backend_server.py`;
    log(`Erreur: ${e.message}`, 'error');
  }
  
  document.getElementById('status-msg').innerHTML = '✅ Prêt';
  btn.disabled = false;
}

async function executeDH(option) {
  await executeWith('dh', option, '');
}

async function executeRSA(mode) {
  await executeWith('rsa', mode, mode);
}

async function executeHash(algo) {
  await executeWith(algo, 'normal', '');
}

async function executeSign(algo) {
  await executeWith(algo, 'normal', '');
}

async function executeApp(algo) {
  await executeWith(algo, 'normal', '');
}

function log(msg, type=''){
  const logBody = document.getElementById('log-body');
  const div = document.createElement('div');
  div.className = `log-entry`;
  div.innerHTML = `<div class="log-time">${new Date().toLocaleTimeString()}</div><div class="log-msg ${type}">${msg}</div>`;
  logBody.appendChild(div);
  logBody.scrollTop = logBody.scrollHeight;
}
function clearLog(){ document.getElementById('log-body').innerHTML = ''; }

buildSidebar();
log('✅ CryptoSuite - Tous les TP1 à TP6', 'success');
log('📡 Sélectionnez un algorithme et utilisez les boutons spécifiques', 'info');
</script>
</body>
</html>
