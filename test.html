<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CryptoSuite</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b14;
  --bg2:#0b1120;
  --bg3:#0f1929;
  --surface:#111d30;
  --surface2:#162035;
  --border:#1e3a5f;
  --border2:#2a4f7a;
  --cyan:#00d4ff;
  --cyan2:#00a8cc;
  --green:#00ff88;
  --green2:#00cc6a;
  --amber:#ffb300;
  --red:#ff4060;
  --purple:#a855f7;
  --text:#d4e8ff;
  --text2:#7fa8cc;
  --text3:#3d6b8f;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:relative;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,180,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(0,255,136,0.03) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,58,95,0.15) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,58,95,0.15) 40px);
  pointer-events:none;
  z-index:0;
}
.scanline{
  position:fixed;
  top:-100%;
  left:0;right:0;
  height:200px;
  background:linear-gradient(transparent,rgba(0,212,255,0.02),transparent);
  animation:scan 8s linear infinite;
  pointer-events:none;
  z-index:1;
}
@keyframes scan{to{top:100%}}

/* HEADER */
header{
  position:relative;z-index:10;
  padding:14px 24px;
  background:rgba(11,17,32,0.95);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:24px;
  backdrop-filter:blur(12px);
}
.logo{
  display:flex;align-items:center;gap:12px;
}
.logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--cyan),var(--green));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
  flex-shrink:0;
}
.logo-text{
  font-family:'Orbitron',monospace;
  font-weight:700;
  font-size:20px;
  background:linear-gradient(90deg,var(--cyan),var(--green));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
.logo-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text3);
  letter-spacing:1px;
}
.header-stats{
  display:flex;gap:20px;margin-left:auto;
}
.hstat{
  display:flex;flex-direction:column;align-items:center;
  padding:4px 16px;
  border:1px solid var(--border);
  border-radius:6px;
  background:rgba(0,212,255,0.03);
}
.hstat-val{
  font-family:'Orbitron',monospace;
  font-size:14px;font-weight:600;
  color:var(--cyan);
}
.hstat-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--text3);
  letter-spacing:1px;text-transform:uppercase;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* MAIN LAYOUT */
main{
  position:relative;z-index:5;
  display:flex;flex:1;overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:220px;flex-shrink:0;
  background:rgba(11,17,32,0.9);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-section{margin-bottom:4px}
.sidebar-header{
  padding:10px 16px 6px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--text3);
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.sidebar-header::after{content:'';flex:1;height:1px;background:var(--border)}
.algo-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;
  cursor:pointer;
  border:none;background:none;
  color:var(--text2);
  font-family:'Exo 2',sans-serif;
  font-size:13px;
  width:100%;text-align:left;
  transition:all 0.15s;
  border-left:2px solid transparent;
  position:relative;
  overflow:hidden;
}
.algo-btn::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:0;
  background:rgba(0,212,255,0.06);
  transition:width 0.2s;
}
.algo-btn:hover::before{width:100%}
.algo-btn:hover{color:var(--text);border-left-color:var(--border2)}
.algo-btn.active{
  color:var(--cyan);
  border-left-color:var(--cyan);
  background:rgba(0,212,255,0.08);
  font-weight:500;
}
.algo-btn.active::before{width:100%}
.algo-icon{
  width:24px;height:24px;
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
}
.algo-btn.active .algo-icon{
  background:rgba(0,212,255,0.15);
}
.algo-badge{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:2px 6px;
  border-radius:3px;
  background:rgba(0,212,255,0.1);
  color:var(--cyan);
  border:1px solid rgba(0,212,255,0.2);
}
.algo-badge.green{background:rgba(0,255,136,0.1);color:var(--green);border-color:rgba(0,255,136,0.2)}
.algo-badge.amber{background:rgba(255,179,0,0.1);color:var(--amber);border-color:rgba(255,179,0,0.2)}
.algo-badge.purple{background:rgba(168,85,247,0.1);color:var(--purple);border-color:rgba(168,85,247,0.2)}
.net-btn{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;
  cursor:pointer;
  border:1px solid var(--border);
  background:rgba(0,212,255,0.03);
  color:var(--text2);
  font-family:'Exo 2',sans-serif;
  font-size:12px;
  margin:3px 10px;
  border-radius:6px;
  transition:all 0.2s;
}
.net-btn:hover{border-color:var(--cyan2);color:var(--cyan);background:rgba(0,212,255,0.08)}
.net-btn.red{border-color:var(--border)}
.net-btn.red:hover{border-color:var(--red);color:var(--red);background:rgba(255,64,96,0.08)}

/* CENTER PANEL */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px}

/* PANEL CARD */
.panel{
  background:rgba(11,17,32,0.8);
  border:1px solid var(--border);
  border-radius:10px;
  backdrop-filter:blur(8px);
  overflow:hidden;
}
.panel-head{
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:rgba(15,25,41,0.6);
}
.panel-title{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text2);
  letter-spacing:1px;
  text-transform:uppercase;
}
.dot-red{width:10px;height:10px;border-radius:50%;background:#ff5f57}
.dot-amber{width:10px;height:10px;border-radius:50%;background:#febc2e}
.dot-green{width:10px;height:10px;border-radius:50%;background:#28c840}
.panel-body{padding:12px 16px}

/* INPUT ROW */
.input-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
label.ilab{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text3);
  letter-spacing:0.5px;
  white-space:nowrap;
}
input.key-in{
  flex:1;min-width:150px;
  background:rgba(15,25,41,0.8);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:7px 12px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
input.key-in:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,0.15)}
input.key-in::placeholder{color:var(--text3)}
.mode-toggle{display:flex;gap:4px}
.mode-btn{
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:5px;
  background:none;
  color:var(--text2);
  font-family:'Exo 2',sans-serif;
  font-size:12px;
  cursor:pointer;
  transition:all 0.15s;
}
.mode-btn:hover{border-color:var(--border2);color:var(--text)}
.mode-btn.active{
  background:rgba(0,212,255,0.12);
  border-color:var(--cyan);
  color:var(--cyan);
  font-weight:500;
}

/* TEXTAREA */
textarea.crypto-ta{
  width:100%;
  background:rgba(7,11,20,0.8);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:12px;
  outline:none;
  resize:none;
  line-height:1.6;
  transition:border-color 0.2s,box-shadow 0.2s;
}
textarea.crypto-ta:focus{border-color:var(--cyan2);box-shadow:0 0 0 2px rgba(0,212,255,0.1)}
textarea.crypto-ta::placeholder{color:var(--text3)}

/* EXECUTE BTN */
.exec-btn{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--green2);
  background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,212,255,0.08));
  color:var(--green);
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.exec-btn::before{
  content:'';
  position:absolute;
  top:0;left:-100%;right:-100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,0.1),transparent);
  transition:left 0.4s;
}
.exec-btn:hover{
  border-color:var(--green);
  color:#fff;
  box-shadow:0 0 24px rgba(0,255,136,0.2),inset 0 0 24px rgba(0,255,136,0.05);
}
.exec-btn:hover::before{left:100%}
.exec-btn:active{transform:scale(0.99)}
.exec-btn.loading{
  color:var(--cyan);
  border-color:var(--cyan);
  background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(0,255,136,0.06));
}

/* OUTPUT */
.output-wrap{position:relative;flex:1;min-height:0}
#output{
  width:100%;height:100%;min-height:100px;
  background:rgba(4,8,15,0.9);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--green);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:14px;
  outline:none;
  resize:none;
  line-height:1.7;
  white-space:pre-wrap;
  word-break:break-all;
}
.output-actions{
  position:absolute;top:8px;right:8px;
  display:flex;gap:6px;
}
.act-btn{
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:4px;
  background:rgba(11,17,32,0.9);
  color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  cursor:pointer;
  transition:all 0.15s;
}
.act-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* FILE BTN */
.file-btn{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:5px;
  background:rgba(0,212,255,0.04);
  color:var(--text2);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  cursor:pointer;
  transition:all 0.15s;
}
.file-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08)}

/* RIGHT PANEL - LOG */
.right-panel{
  width:300px;flex-shrink:0;
  background:rgba(9,14,24,0.9);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.log-head{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text2);
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.log-body{
  flex:1;overflow-y:auto;
  padding:8px;
}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-entry{
  padding:6px 8px;
  margin-bottom:4px;
  border-radius:5px;
  background:rgba(15,25,41,0.5);
  border:1px solid rgba(30,58,95,0.4);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  line-height:1.5;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.log-time{color:var(--text3)}
.log-msg{color:var(--text2);margin-top:2px}
.log-msg.success{color:var(--green)}
.log-msg.error{color:var(--red)}
.log-msg.info{color:var(--cyan)}
.log-msg.warn{color:var(--amber)}
.log-footer{
  padding:8px;
  border-top:1px solid var(--border);
}
.clear-log{
  width:100%;
  padding:6px;
  border:1px solid var(--border);
  border-radius:5px;
  background:none;
  color:var(--text3);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  cursor:pointer;
  transition:all 0.15s;
}
.clear-log:hover{border-color:var(--red);color:var(--red)}

/* BOTTOM STATUS */
.statusbar{
  position:relative;z-index:10;
  padding:5px 20px;
  background:rgba(7,11,20,0.97);
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text3);
}
#status-msg{color:var(--green);transition:color 0.3s}
.sb-sep{color:var(--border2)}
#perf-ms{color:var(--amber)}

/* ALGO INFO CHIP */
.algo-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  border-radius:20px;
  background:rgba(0,212,255,0.06);
  border:1px solid rgba(0,212,255,0.15);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--cyan);
  letter-spacing:0.5px;
}
.info-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.info-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  padding:3px 8px;
  border-radius:4px;
  background:rgba(30,58,95,0.4);
  color:var(--text3);
  border:1px solid var(--border);
}

/* OUTPUT PLACEHOLDER */
.out-placeholder{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text3);
  font-style:italic;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:8px 20px;
  background:rgba(11,17,32,0.95);
  border:1px solid var(--green);
  border-radius:6px;
  color:var(--green);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  opacity:0;
  transition:all 0.3s;
  z-index:999;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* HIDDEN FILE INPUT */
#fileInput{display:none}

/* RESIZE - allow flex cols to shrink */
@media(max-width:1100px){
  .right-panel{width:240px}
  .sidebar{width:190px}
}
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <div class="logo-text">CRYPTOSUITE</div>
      <div class="logo-sub">TP1 → TP6 · ALL ALGORITHMS</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><span class="hstat-val" id="ops-count">0</span><span class="hstat-lbl">Ops</span></div>
    <div class="hstat"><span class="hstat-val" id="last-ms">—</span><span class="hstat-lbl">Last ms</span></div>
    <div class="hstat" style="gap:6px;flex-direction:row;align-items:center;">
      <div class="status-dot"></div>
      <span class="hstat-lbl">ONLINE</span>
    </div>
  </div>
</header>

<main>
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-header">TP1 · Classique</div>
    <button class="algo-btn active" onclick="setAlgo(this,'cesar')">
      <span class="algo-icon">Cæ</span>César
      <span class="algo-badge">+3</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'vigenere')">
      <span class="algo-icon">V</span>Vigenère
      <span class="algo-badge">poly</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'otp')">
      <span class="algo-icon">∞</span>OTP
      <span class="algo-badge green">∞-bit</span>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-header">TP2 · Symétrique</div>
    <button class="algo-btn" onclick="setAlgo(this,'rc4')">
      <span class="algo-icon">R4</span>RC4
      <span class="algo-badge">stream</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'aes')">
      <span class="algo-icon">AES</span>AES-256
      <span class="algo-badge green">256</span>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-header">TP4 · Hachage</div>
    <button class="algo-btn" onclick="setAlgo(this,'md5')">
      <span class="algo-icon">#</span>MD5
      <span class="algo-badge amber">128b</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'sha256')">
      <span class="algo-icon">#</span>SHA-256
      <span class="algo-badge">256b</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'sha512')">
      <span class="algo-icon">#</span>SHA-512
      <span class="algo-badge green">512b</span>
    </button>
    <button class="algo-btn" onclick="setAlgo(this,'hmac')">
      <span class="algo-icon">HM</span>HMAC-SHA256
      <span class="algo-badge">mac</span>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-header">TP6 · Réseau</div>
    <button class="net-btn" onclick="runNetwork('bluetooth')">🔵 Bluetooth</button>
    <button class="net-btn" onclick="runNetwork('wifi')">📡 Wi-Fi WPA2</button>
    <button class="net-btn" onclick="runNetwork('vote')">🗳️ Vote électronique</button>
    <button class="net-btn" onclick="runNetwork('tcp_server')">🚀 Serveur TCP</button>
    <button class="net-btn" onclick="runNetwork('tcp_client')">🖥️ Client TCP</button>
    <button class="net-btn red" onclick="runNetwork('stop')">🛑 Arrêter serveur</button>
  </div>
</aside>

<!-- CENTER -->
<section class="center">
  <!-- INPUT PANEL -->
  <div class="panel" style="flex-shrink:0">
    <div class="panel-head">
      <div class="dot-red"></div><div class="dot-amber"></div><div class="dot-green"></div>
      <span class="panel-title" style="margin-left:6px">INPUT</span>
      <span id="algo-chip-label" class="algo-chip" style="margin-left:auto">CÉSAR</span>
      <label class="file-btn" for="fileInput" style="margin-left:8px">📁 Charger</label>
      <input type="file" id="fileInput" accept=".txt,*" onchange="loadFile(this)"/>
      <button class="act-btn" onclick="clearInput()">✕ Effacer</button>
    </div>
    <div class="panel-body">
      <div class="info-bar" id="info-bar">
        <span class="info-tag" id="info-type">Chiffrement symétrique</span>
        <span class="info-tag" id="info-key">Clé: décalage numérique</span>
        <span class="info-tag" id="info-security">⚠ Sécurité historique</span>
      </div>
      <div class="input-row">
        <label class="ilab">CLÉ :</label>
        <input class="key-in" id="key" value="secretkey123" placeholder="Entrez la clé..."/>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-enc" onclick="setMode('encrypt',this)">⬆ Chiffrer</button>
          <button class="mode-btn" id="btn-dec" onclick="setMode('decrypt',this)">⬇ Déchiffrer</button>
        </div>
      </div>
      <textarea class="crypto-ta" id="input-text" rows="5" placeholder="Entrez votre texte ici... (ex: Bonjour le monde)"></textarea>

// ===== ALGORITHMS =====
function cesarEncrypt(text, shift) {
  return [...text].map(c=>{
    if(!c.match(/[a-zA-Z]/)) return c;
    const off = c<='Z'?65:97;
    return String.fromCharCode(((c.charCodeAt(0)-off+shift)%26+26)%26+off);
  }).join('');
}

function vigenereOp(text, key, enc) {
  key = key.toUpperCase().replace(/[^A-Z]/g,'') || 'A';
  let ki=0;
  return [...text].map(c=>{
    if(!c.match(/[a-zA-Z]/)) return c;
    const off = c<='Z'?65:97;
    const sh = key.charCodeAt(ki%key.length)-65;
    ki++;
    return String.fromCharCode(((c.charCodeAt(0)-off+(enc?sh:-sh)+260))%26+off);
  }).join('');
}

function rc4(data, key, enc) {
  const kb=[...key].map(c=>c.charCodeAt(0));
  const S=[...Array(256).keys()];
  let j=0;
  for(let i=0;i<256;i++){j=(j+S[i]+kb[i%kb.length])%256;[S[i],S[j]]=[S[j],S[i]];}
  const bytes = enc ? [...data].map(c=>c.charCodeAt(0)) : data.match(/../g).map(h=>parseInt(h,16));
  let i2=0,j2=0;
  const out=bytes.map(b=>{
    i2=(i2+1)%256;j2=(j2+S[i2])%256;
    [S[i2],S[j2]]=[S[j2],S[i2]];
    return b^S[(S[i2]+S[j2])%256];
  });
  return enc ? out.map(b=>b.toString(16).padStart(2,'0')).join('') : out.map(b=>String.fromCharCode(b)).join('');
}

async function sha(text, algo) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest(algo, enc.encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function hmac(text, key) {
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey('raw', enc.encode(key), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, enc.encode(text));
  return [...new Uint8Array(sig)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

  function bitRotateLeft(num,cnt){return num<<cnt|num>>>32-cnt}

    a=md5ii(a,b,c,d,bArr[i+12],6,1700485571);d=md5ii(d,a,b,c,bArr[i+3],10,-1894986606);c=md5ii(c,d,a,b,bArr[i+10],15,-1051523);b=md5ii(b,c,d,a,bArr[i+1],21,-2054922799);
    a=md5ii(a,b,c,d,bArr[i+8],6,1873313359);d=md5ii(d,a,b,c,bArr[i+15],10,-30611744);c=md5ii(c,d,a,b,bArr[i+6],15,-1560198380);b=md5ii(b,c,d,a,bArr[i+13],21,1309151649);
    a=md5ii(a,b,c,d,bArr[i+4],6,-145523070);d=md5ii(d,a,b,c,bArr[i+11],10,-1120210379);c=md5ii(c,d,a,b,bArr[i+2],15,718787259);b=md5ii(b,c,d,a,bArr[i+9],21,-343485551);

}

// ===== EXECUTE =====
async function execute() {
  const text = document.getElementById('input-text').value.trim();
  const key  = document.getElementById('key').value;
  if(!text){showToast('⚠ Entrez un texte!');return;}

  const btn = document.getElementById('exec-btn');
  btn.classList.add('loading');
  btn.textContent = '⏳  TRAITEMENT...';
  document.getElementById('status-msg').style.color='var(--amber)';
  document.getElementById('status-msg').textContent='⏳ Traitement en cours...';

  const t0 = performance.now();
  let result = '';

  try {
    switch(currentAlgo){
      case 'cesar':{
        const shift = parseInt(key)||3;
        result = currentMode==='encrypt' ? cesarEncrypt(text,shift) : cesarEncrypt(text,-shift);
        break;
      }
      case 'vigenere':
        result = vigenereOp(text,key||'A',currentMode==='encrypt');
        break;
      case 'otp':{
        if(currentMode==='encrypt'){
          const bytes=new Uint8Array(new TextEncoder().encode(text));
          const rand=new Uint8Array(bytes.length);
          crypto.getRandomValues(rand);
          const cipher=[...bytes].map((b,i)=>b^rand[i]);
          result=`CHIFFRÉ  : ${cipher.map(b=>b.toString(16).padStart(2,'0')).join('')}\nCLÉ OTP  : ${[...rand].map(b=>b.toString(16).padStart(2,'0')).join('')}\n\n⚠ Conservez la clé OTP en lieu sûr!`;
        } else {
          result='OTP déchiffrement: XOR chiffré ⊕ clé (format hex)';
        }
        break;
      }
      case 'rc4':
        result = rc4(text,key||'key',currentMode==='encrypt');
        break;
      case 'aes':{
        const h=await sha(key+text,'SHA-256');
        result = currentMode==='encrypt' ? `AES-256-CBC simulé:\n${h}\n(Clé dérivée: ${h.substring(0,32)})` : 'Déchiffrement AES simulé';
        break;
      }
      case 'md5':
        result = md5(text);
        break;
      case 'sha256':
        result = await sha(text,'SHA-256');
        break;
      case 'sha512':
        result = await sha(text,'SHA-512');
        break;
      case 'hmac':
        result = await hmac(text,key||'key');
        break;
      default:
        result='⚠ Algorithme inconnu';
    }

    const elapsed = performance.now()-t0;
    document.getElementById('output').value = result;
    document.getElementById('perf-ms').textContent = elapsed.toFixed(2)+'ms';
    document.getElementById('last-ms').textContent = elapsed.toFixed(1);
    opsCount++;
    document.getElementById('ops-count').textContent = opsCount;
    document.getElementById('status-msg').style.color='var(--green)';
    document.getElementById('status-msg').textContent=`✅ Terminé · ${algoInfo[currentAlgo]?.label||currentAlgo} · ${elapsed.toFixed(2)}ms`;
    log(`${algoInfo[currentAlgo]?.label||currentAlgo} → ${currentMode==='encrypt'?'chiffrement':'déchiffrement'} OK · ${elapsed.toFixed(2)}ms`,'success');
  } catch(e){
    document.getElementById('output').value = '❌ Erreur: '+e.message;
    document.getElementById('status-msg').style.color='var(--red)';
    document.getElementById('status-msg').textContent='❌ Erreur: '+e.message;
    log('Erreur: '+e.message,'error');
  }

  btn.classList.remove('loading');
  btn.textContent='▶  EXÉCUTER';
}

function loadFile(inp) {
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload=e=>{
    document.getElementById('input-text').value=e.target.result;
    log('Fichier chargé: '+f.name,'info');
  };
  r.readAsText(f);
}

function clearInput(){
  document.getElementById('input-text').value='';
  log('Entrée effacée','warn');
}

function copyOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{showToast('✅ Copié!');log('Output copié','success');});
}

function saveOutput(){
  const v=document.getElementById('output').value;
  if(!v)return;
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(v);
  a.download='cryptosuite_output.txt';
  a.click();
  log('Output sauvegardé','success');
}

let logCount=0;
function log(msg,type=''){
  logCount++;
  document.getElementById('log-count').textContent=logCount;
  const now=new Date().toTimeString().slice(0,8);
  const div=document.createElement('div');
  div.className='log-entry';
  div.innerHTML=`<div class="log-time">${now}</div><div class="log-msg ${type}">${msg}</div>`;
  const body=document.getElementById('log-body');
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}
function clearLog(){
  document.getElementById('log-body').innerHTML='';
  logCount=0;
  document.getElementById('log-count').textContent='0';
}
